spring.application.name=twitter-clone-backend

# ---- Database ----
# In production (Railway/Render), set these as environment variables:
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:twitterclone;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Never serialize lazy proxies accidentally - open-in-view OFF forces us to use DTOs everywhere,
# which is exactly what prevents the "could not initialize proxy - no Session" error.
spring.jpa.open-in-view=false

# H2 console for local debugging only
spring.h2.console.enabled=${H2_CONSOLE:false}
spring.h2.console.path=/h2-console

# ---- JWT ----
# IMPORTANT: override jwt.secret with an env var in production (min 256-bit random string)
jwt.secret=${JWT_SECRET:this-is-a-dev-only-secret-key-change-me-in-production-env-vars-32bytes}
jwt.expiration.ms=${JWT_EXPIRATION_MS:604800000}

# ---- CORS ----
# Comma-separated list of allowed frontend origins. Add every domain that will call this API
# (localhost for dev, your Vercel domain(s) for prod). This is what makes login work from
# every device/browser, not just the ones that happened to work before.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://twitter-clone-frontend-iota-ten.vercel.app}

# ---- File uploads ----
app.upload.dir=${UPLOAD_DIR:uploads/profile}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

server.port=${PORT:8080}
